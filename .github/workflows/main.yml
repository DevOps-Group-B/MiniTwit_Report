name: Build Report PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir -p report/build

      - name: Convert Markdown to PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: report
          output_dir: report/build
          build_pdf: true

      - name: Rename PDF to comply with naming convention
        run: mv report/build/Report.pdf report/build/BSc_group_a.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-report
          path: report/build/BSc_group_a.pdf
